version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: birdieiq
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
  web:
    build: ./apps/web
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/birdieiq
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - db
      - analytics
  analytics:
    build: ./services/analytics
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/birdieiq
    depends_on:
      - db
volumes:
  db_data:
