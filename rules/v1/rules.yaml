# BirdieIQ — Rules engine v1 (CP-5)
# Evaluated by services/analytics/rules/evaluator.py (CP-11)
# Spec: docs/specs/05-recommendation-engine.md

version: "1"

rules:
  - id: R01
    enabled: true
    priority: 85
    cooldown_days: 14
    condition:
      type: derived
      metric_key: gir_one_putt_pct
      window: last_10
      operator: lt
      value: 0.75
    insight:
      title: Short putts costing you
      body: >-
        Your one-putt rate on greens in regulation is below 75% (BirdieIQ proxy for
        inside-6-foot makes). Spend most of practice on short putts.
    practice_template_id: short_putt_gate

  - id: R02
    enabled: true
    priority: 80
    cooldown_days: 14
    condition:
      type: derived
      metric_key: three_putt_rate
      window: last_10
      operator: gt
      value: 0.15
    insight:
      title: Too many three-putts
      body: More than 15% of your holes are three-putts. Lag putting and speed control are the fastest fix.
    practice_template_id: lag_putting_ladder

  - id: R03
    enabled: true
    priority: 75
    cooldown_days: 14
    condition:
      type: derived
      metric_key: gir_pct_delta
      window: last_5
      operator: delta_lt
      value: -10
    insight:
      title: Greens in regulation slipping
      body: Your GIR percentage dropped more than 10 points vs your prior 10-round window. Wedge and approach play need attention.
    practice_template_id: wedge_gir_challenge

  - id: R04
    enabled: true
    priority: 70
    cooldown_days: 14
    condition:
      type: metric
      metric_key: fir_pct
      window: last_10
      operator: lt
      value: 45
    insight:
      title: Fairways not found
      body: Fairways hit below 45% over your last 10 rounds. Driver accuracy is a primary scoring leak.
    practice_template_id: fairway_finder

  - id: R05
    enabled: true
    priority: 70
    cooldown_days: 14
    condition:
      type: derived
      metric_key: penalties_per_round
      window: last_5
      operator: gt
      value: 2
    insight:
      title: Penalties adding up
      body: You are averaging more than two penalty strokes per round. Smarter targets beat aggressive lines.
    practice_template_id: course_management

  - id: R06
    enabled: true
    priority: 65
    cooldown_days: 14
    condition:
      type: metric
      metric_key: scoring_leak_par5
      window: last_10
      operator: gt
      value: 1.0
    insight:
      title: Par 5s bleeding strokes
      body: On par 5s you average more than one stroke over par. Lay-up strategy and wedge third shots are key.
    practice_template_id: layup_strategy

  - id: R07
    enabled: true
    priority: 75
    cooldown_days: 14
    condition:
      type: derived
      metric_key: double_plus_per_round
      window: last_5
      operator: gt
      value: 3
    insight:
      title: Too many doubles
      body: You are averaging more than three double-bogey-or-worse holes per round. Damage control limits big numbers.
    practice_template_id: damage_control

  - id: R08
    enabled: true
    priority: 80
    cooldown_days: 14
    condition:
      type: metric
      metric_key: putting_avg
      window: last_10
      operator: gt
      value: 1.89
    insight:
      title: Putting above tour pace
      body: Your putting average exceeds 34 putts per 18 holes (1.89 per hole). Holing more mid-range putts shifts scores quickly.
    practice_template_id: putting_clock

  - id: R09
    enabled: true
    priority: 65
    cooldown_days: 14
    condition:
      type: derived
      metric_key: missed_gir_inside_100y_pct
      window: last_10
      operator: gt
      value: 0.40
    insight:
      title: Struggling inside 100 yards
      body: When you miss the green on par 4/5, approach play from 100 yards and in is costing you (proxy metric).
    practice_template_id: wedge_distance_matrix

  - id: R10
    enabled: true
    priority: 70
    cooldown_days: 7
    condition:
      type: derived
      metric_key: blow_up_holes_last3
      window: last_3
      operator: gte
      value: 1
    insight:
      title: Recent blow-up hole
      body: At least one triple-or-worse in your last three rounds. Reset between shots and tighten tee strategy.
    practice_template_id: mental_reset_tee

  - id: R11
    enabled: true
    priority: 60
    cooldown_days: 14
    condition:
      type: derived
      metric_key: back_nine_leak
      window: last_5
      operator: gt
      value: 2.0
    insight:
      title: Back nine fade
      body: Your back-nine scoring is more than two strokes worse than the front on recent 18-hole rounds.
    practice_template_id: stamina_pace

  - id: R12
    enabled: true
    priority: 60
    cooldown_days: 14
    condition:
      type: derived
      metric_key: par3_vs_par45_leak
      window: last_10
      operator: gt
      value: 0.5
    insight:
      title: Par 3s lagging par 4/5
      body: Par-3 scoring is significantly worse than your par 4/5 scoring. Club selection and conservative targets help.
    practice_template_id: par3_tee_selection

  - id: R13
    enabled: true
    priority: 55
    cooldown_days: 14
    condition:
      type: derived
      metric_key: sand_save_proxy_pct
      window: last_10
      operator: lt
      value: 0.20
    insight:
      title: Sand saves low
      body: When you find bunkers or take penalty strokes around the green, getting up-and-down under 20% (proxy).
    practice_template_id: bunker_entry

  - id: R14
    enabled: true
    priority: 65
    cooldown_days: 14
    condition:
      type: derived
      metric_key: up_and_down_proxy_pct
      window: last_10
      operator: lt
      value: 0.30
    insight:
      title: Up-and-down rate low
      body: You are getting up-and-down less than 30% when missing the green (proxy without shot tracking).
    practice_template_id: chip_to_3ft

  - id: R15
    enabled: true
    priority: 55
    cooldown_days: 14
    condition:
      type: derived
      metric_key: volatility_delta_pct
      window: last_5
      operator: gt
      value: 0.20
    insight:
      title: Scores becoming volatile
      body: Score volatility increased more than 20% recently. A consistent routine tightens dispersion.
    practice_template_id: consistency_routine

  - id: R16
    enabled: true
    priority: 80
    cooldown_days: 10
    condition:
      type: derived
      metric_key: scoring_avg_last3_trend
      window: last_3
      operator: eq
      value: 1
    insight:
      title: Scoring trending up
      body: Your last three round totals are each higher than the previous — time for a full bag and strategy audit.
    practice_template_id: full_bag_audit

  - id: R17
    enabled: true
    priority: 50
    cooldown_days: 21
    condition:
      type: metric
      metric_key: sg_app
      window: last_10
      operator: lt
      value: -0.3
    insight:
      title: Approach play leaking strokes
      body: Approach strokes-gained proxy is below −0.3 per hole. Gapping and iron consistency should be your range focus.
    practice_template_id: gapping_session

  - id: R18
    enabled: true
    priority: 40
    cooldown_days: 30
    condition:
      type: derived
      metric_key: latest_round_no_shots
      window: last_1
      operator: eq
      value: 1
    insight:
      title: Add shot tracking
      body: Your most recent round has no shot-level data. Logging clubs unlocks better recommendations later.
    practice_template_id: shot_tracking_prompt

  - id: R19
    enabled: true
    priority: 95
    cooldown_days: 7
    condition:
      type: round_count
      metric_key: rounds_in_system
      window: all
      operator: lt
      value: 5
    insight:
      title: Build your round history
      body: Fewer than five rounds in BirdieIQ. Import CSV or enter rounds to unlock full coaching insights.
    practice_template_id: import_onboarding

  - id: R20
    enabled: true
    priority: 10
    cooldown_days: 21
    condition:
      type: fallback
      metric_key: maintenance
      window: last_10
      operator: eq
      value: 1
    insight:
      title: Stay sharp — maintenance week
      body: No major leaks flagged. Rotate practice across your strongest and weakest areas to stay tournament-ready.
    practice_template_id: maintenance_rotation
